name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build, Test & Lint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Sélectionner la dernière version de Xcode
        run: sudo xcode-select -s "$(ls -d /Applications/Xcode_*.app | sort -V | tail -1)"

      - name: Installer les outils
        run: brew install xcodegen swiftlint

      - name: Générer le projet Xcode
        run: xcodegen generate

      - name: SwiftLint
        run: swiftlint lint --strict

      - name: Installer le Metal Toolchain (Xcode 26+)
        run: xcodebuild -downloadComponent MetalToolchain || true

      - name: Choisir un simulateur iOS disponible
        id: sim
        run: |
          DEST=$(xcrun simctl list devices available | grep -m1 -oE 'iPhone 1[0-9]( Pro)?')
          echo "name=${DEST:-iPhone 16}" >> "$GITHUB_OUTPUT"

      - name: Build & Test (app iOS)
        run: |
          set -o pipefail
          xcodebuild -project Maxiterm.xcodeproj -scheme Maxiterm \
            -destination "platform=iOS Simulator,name=${{ steps.sim.outputs.name }}" \
            -skipMacroValidation clean test

      - name: Tests des packages (codec SFTP, parsing de clé)
        run: |
          set -o pipefail
          swift test --package-path Packages/SSHKit
          swift test --package-path Packages/SFTPKit
